<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomi's Blog</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        .container {
            width: 80%;
            margin: 30px auto;
        }

        .header {
            background-color: white;
            padding: 40px;
            text-align: center;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .card {
            background-color: white;
            margin-top: 20px;
            padding: 20px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }

        .title {
            font-size: 20px;
            font-weight: bold;
        }

        .date {
            font-size: 12px;
            color: gray;
            margin: 10px 0;
        }

        .content {
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- Header -->
        <div class="header">
            Sumeet's Blog
        </div>
       
        <!-- Blog Post 1 -->
        <div class="card">
          
            <h1>{{posts.title}}</h1>
            <h5>{{posts.created_at}}</h5>
            <p>{{posts.body}}</p>
          
        </div>
       
    </div>

</body>
</html>
